<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LMS Imports - Detailed System Tutorial</title>
  <style>
    :root { --ink:#17212b; --muted:#5c6b7c; --line:#d7e0e8; --panel:#fff; --bg:#f3f6f8; --brand:#0f6864; --soft:#e9f2f1; --warn:#fff2cc; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Arial, Helvetica, sans-serif; background:var(--bg); color:var(--ink); }
    .layout { display:grid; grid-template-columns:270px 1fr; min-height:100vh; }
    aside { background:#fbfcfd; border-right:1px solid var(--line); padding:18px 12px; overflow:auto; max-height:100vh; position:sticky; top:0; }
    .brand { font-weight:900; font-size:20px; color:#0b4c54; }
    .tag { color:var(--muted); font-size:12px; margin:4px 0 16px; line-height:1.4; }
    .chapter { display:block; width:100%; text-align:left; border:1px solid transparent; background:transparent; border-radius:7px; padding:9px 10px; margin:3px 0; cursor:pointer; font-weight:800; color:#273847; }
    .chapter small { display:block; color:var(--muted); font-weight:700; margin-top:2px; }
    .chapter.active { background:var(--soft); border-color:#b9d6d3; color:#074e52; }
    main { padding:22px; }
    .top { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:14px; }
    h1 { margin:0; font-size:26px; }
    .sub { color:var(--muted); font-size:13px; }
    button { border:1px solid var(--line); background:#fff; border-radius:7px; padding:9px 13px; color:#253342; font-weight:800; cursor:pointer; }
    button.primary { background:var(--brand); color:#fff; border-color:var(--brand); }
    .controls { display:flex; gap:8px; flex-wrap:wrap; }
    .stage { position:relative; background:linear-gradient(180deg, #f8fafb, #edf2f5); border:1px solid var(--line); border-radius:10px; min-height:720px; overflow:hidden; box-shadow:0 20px 45px rgba(30,45,58,.08); }
    .screen { padding:20px; padding-bottom:145px; min-height:720px; }
    .module-title { display:flex; justify-content:space-between; align-items:center; gap:12px; border-bottom:1px solid var(--line); padding-bottom:14px; margin-bottom:14px; }
    .module-title strong { font-size:22px; }
    .stats { display:grid; grid-template-columns:repeat(4, 1fr); gap:12px; margin:14px 0; }
    .card, .panel, .form { background:var(--panel); border:1px solid var(--line); border-radius:8px; }
    .card { padding:15px; }
    .label { color:var(--muted); text-transform:uppercase; font-size:12px; font-weight:900; }
    .value { font-size:26px; font-weight:900; margin:8px 0 4px; }
    .panel { overflow:hidden; margin-top:14px; }
    .panel-head { display:flex; justify-content:space-between; align-items:center; padding:14px 16px; border-bottom:1px solid var(--line); gap:10px; }
    .search { width:58%; padding:11px 12px; border:1px solid var(--line); border-radius:7px; background:#fff; color:#607080; }
    table { width:100%; border-collapse:collapse; font-size:14px; min-width:920px; }
    th, td { border-bottom:1px solid var(--line); padding:11px 12px; text-align:left; vertical-align:top; }
    th { background:#eaf0f4; color:#253342; font-size:12px; text-transform:uppercase; letter-spacing:.04em; }
    .table-wrap { overflow:auto; max-height:330px; }
    .badge { display:inline-block; border-radius:999px; background:#edf2f5; padding:5px 9px; font-size:12px; font-weight:900; }
    .ok { background:#d9f3e3; color:#0a6b38; }
    .warn { background:#fff0c9; color:#855900; }
    .bad { background:#fde0dc; color:#a0342b; }
    .form { padding:14px; display:grid; grid-template-columns:repeat(3, 1fr); gap:12px; margin-top:14px; }
    .field label { display:block; font-size:12px; text-transform:uppercase; color:#526174; font-weight:900; margin-bottom:7px; }
    .input { border:1px solid var(--line); border-radius:7px; background:#fff; padding:11px 12px; min-height:42px; color:#1f2d3a; }
    .wide { grid-column:1 / -1; }
    .split { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .phone { width:360px; max-width:100%; border:10px solid #26323d; border-radius:28px; background:#f6f8fa; margin:0 auto; min-height:520px; padding:14px; box-shadow:0 20px 32px rgba(0,0,0,.16); }
    .phone h3 { margin:4px 0 10px; }
    .phone-card { background:#fff; border:1px solid var(--line); border-radius:10px; padding:12px; margin:10px 0; }
    .cursor { position:absolute; width:28px; height:28px; left:var(--x); top:var(--y); transition:left .45s ease, top .45s ease; filter:drop-shadow(0 8px 10px rgba(0,0,0,.25)); z-index:4; }
    .cursor:before { content:""; display:block; width:0; height:0; border-top:24px solid #17212b; border-right:14px solid transparent; transform:rotate(-20deg); }
    .caption { position:absolute; left:22px; right:22px; bottom:20px; background:rgba(15,24,33,.94); color:#fff; border-radius:10px; padding:15px 18px; font-size:19px; line-height:1.38; z-index:5; box-shadow:0 16px 32px rgba(0,0,0,.18); }
    .caption small { display:block; color:#b8c8d7; font-size:12px; margin-bottom:4px; text-transform:uppercase; font-weight:900; letter-spacing:.06em; }
    .progress { height:8px; background:#d9e2e8; border-radius:999px; overflow:hidden; margin-top:12px; }
    .bar { height:100%; background:var(--brand); width:0; transition:width .25s; }
    @media (max-width:980px) { .layout { grid-template-columns:1fr; } aside { position:static; max-height:none; } .stats, .form, .split { grid-template-columns:1fr; } .search { width:100%; } .module-title { flex-direction:column; align-items:flex-start; } .stage, .screen { min-height:820px; } }
  </style>
</head>
<body>
  <div class="layout">
    <aside>
      <div class="brand">LMS Imports</div>
      <div class="tag">Detailed tutorial with subtitles. Click any chapter to jump directly to that module.</div>
      <div id="chapters"></div>
    </aside>
    <main>
      <div class="top">
        <div><h1>Detailed System Tutorial</h1><div class="sub">A guided walk-through of the working system screens, controls, and mobile mechanic view.</div></div>
        <div class="controls">
          <button id="prev">Previous</button>
          <button class="primary" id="play">Play</button>
          <button id="next">Next</button>
        </div>
      </div>
      <div class="stage">
        <div class="screen" id="screen"></div>
        <div class="cursor" id="cursor"></div>
        <div class="caption"><small id="stepCount"></small><span id="caption"></span><div class="progress"><div class="bar" id="bar"></div></div></div>
      </div>
    </main>
  </div>
  <script>
    const steps = [
      { group:"Start", title:"Log in", x:"55%", y:"50%", caption:"Each company user logs in with the access you assigned. Mechanics can be limited to the mobile repair clock-in workflow only.", html:loginScreen() },
      { group:"Home", title:"Dashboard", x:"78%", y:"20%", caption:"The dashboard is the daily command center. Use it to review action items, quick links, low stock, sales exposure, fleet status, accounting control, and recent movement.", html:dashboard() },
      { group:"Inventory", title:"Create product", x:"88%", y:"20%", caption:"Products store master data only. SKU is unique, cost can be blank until purchasing, and selling price or markup percent can be used, but not both at the same time.", html:productForm() },
      { group:"Inventory", title:"Stock movement", x:"86%", y:"28%", caption:"Stock Movement is read-only history. Goods receipts, sales issues, repairs, transfers, and corrections post here with vendor, customer, dates, quantities, and FIFO cost.", html:stockMovement() },
      { group:"Purchasing", title:"Purchase order", x:"88%", y:"27%", caption:"Create a PO with vendor, terms, incoterm, jobsite or project, currency options, freight, and line items. The PO itself does not create accounting until goods are received.", html:purchasingForm() },
      { group:"Purchasing", title:"Goods receipt", x:"78%", y:"45%", caption:"When items arrive, receive against the PO. You can receive full or partial quantities, add invoice references, and reverse a receipt if it was posted wrong.", html:goodsReceipt() },
      { group:"Accounting", title:"AP and check run", x:"86%", y:"25%", caption:"After goods receipt, AP can post from PO or receipt. The accounting path is Inventory to Parts Accrual, then Parts Accrual to AP, then AP to cash or credit card payable when paid.", html:apCheckRun() },
      { group:"Sales", title:"Sales and parts to order", x:"88%", y:"32%", caption:"Sales orders can be approved even when parts are out of stock. Available items invoice normally; shortages stay reserved in Parts to Order until purchasing receives them.", html:salesOrder() },
      { group:"Fleet", title:"Fleet asset master", x:"90%", y:"22%", caption:"Fleet tracks photos, new QR, old QR, asset number, description, type, parent-child relationships, location, scan dates, and whether a new QR label needs printing.", html:fleetMaster() },
      { group:"Fleet", title:"QR scan", x:"48%", y:"53%", caption:"Scanning a QR code can update location, upload a new asset photo, or request repair. The phone timestamp and GPS location are captured when allowed by the browser.", html:qrScan() },
      { group:"Repairs", title:"Work order", x:"89%", y:"22%", caption:"A work order records customer PO, asset, priority, issues, requested parts, labor history, ready-to-close status, and invoice readiness.", html:workOrder() },
      { group:"Mechanic", title:"Mobile clock in", x:"50%", y:"56%", caption:"Mechanics see only their assigned work orders and help requests. Once clocked in, the mobile page focuses on that one work order so there is less chance of confusion.", html:mechanicMobile() },
      { group:"Mechanic", title:"Parts and close request", x:"50%", y:"64%", caption:"Mechanics can request parts by SKU or description, accept reserved parts, ask for helper mechanics, and mark the job ready to close when work is done.", html:mechanicParts() },
      { group:"Billing", title:"Invoice", x:"82%", y:"25%", caption:"Invoices include signature space, customer details, line items with units, and chronological work-done narration for work order billing.", html:invoiceScreen() },
      { group:"Accounting", title:"Reports", x:"84%", y:"24%", caption:"Use accounting reports for GL detail, AR and AP aging, income statement, balance sheet, cash flow, bank reconciliation, and exports filtered by date or selected columns.", html:reports() },
    ];
    let index = 0;
    let timer = null;
    const $ = (id) => document.getElementById(id);
    function badge(text, cls = "") { return `<span class="badge ${cls}">${text}</span>`; }
    function header(title, sub, action = "New") { return `<div class="module-title"><div><strong>${title}</strong><div class="sub">${sub}</div></div><div class="controls"><button>Excel</button><button>PDF / Print</button><button class="primary">${action}</button></div></div>`; }
    function table(heads, rows) { return `<div class="table-wrap"><table><thead><tr>${heads.map(h => `<th>${h}</th>`).join("")}</tr></thead><tbody>${rows.map(r => `<tr>${r.map(c => `<td>${c}</td>`).join("")}</tr>`).join("")}</tbody></table></div>`; }
    function card(label, value, sub) { return `<div class="card"><div class="label">${label}</div><div class="value">${value}</div><div class="sub">${sub}</div></div>`; }
    function loginScreen() { return `${header("Log in", "Use your company account and assigned module access.", "Log in")}<div class="form" style="max-width:520px;margin:90px auto"><div class="field wide"><label>Email or username</label><div class="input">bryan.dy@lmsfm.com</div></div><div class="field wide"><label>Password</label><div class="input">••••••••••</div></div><button class="primary wide">Log in</button></div>`; }
    function dashboard() { return `${header("Dashboard", "A clear view of stock, value, alerts, and movement.", "Refresh")}<div class="stats">${card("Inventory Value","$4,895.87","467 units on hand")}${card("Open Sales / AR","2","$1,164.88 receivable pipeline")}${card("AP To Control","8","$3,393.45 payable exposure")}${card("Fleet & Repairs","9","1 open WO")}</div><div class="panel"><div class="panel-head"><strong>Action Needed</strong></div>${table(["Alert","Module","Action"], [["1 inventory item is below reorder point","Products",badge("Review")],["2 purchase orders need matching review","Purchasing",badge("Review")],["4 bank transactions are unmatched","Bank Recon",badge("Review")]])}</div>`; }
    function productForm() { return `${header("Products", "Manage SKUs, pricing, locations, reorder points, and batches.", "Add product")}<div class="form"><div class="field"><label>SKU</label><div class="input">SKU-1017</div></div><div class="field"><label>Product name</label><div class="input">Hydraulic filter</div></div><div class="field"><label>Unit</label><div class="input">Each</div></div><div class="field"><label>Cost</label><div class="input">Blank until purchasing</div></div><div class="field"><label>Selling price</label><div class="input">$42.00</div></div><div class="field"><label>Markup %</label><div class="input">Leave blank if price is used</div></div><div class="field wide"><label>Compatible with</label><div class="input">Search asset, model, attachment family, or keyword</div></div><div class="field wide"><label>Alternative SKUs</label><div class="input">Add more rows as needed</div></div></div>`; }
    function stockMovement() { return `${header("Stock Movement", "Receive, sell, adjust, transfer, reserve, and audit stock.", "Approved correction")}<input class="search" value="Search stock ledger by product, SKU, type, reference, location">${table(["Date","Reference","Type","Product","Vendor","Sold To","Qty","Unit FIFO","Total FIFO","Document"], [["2026-05-19","SM-5016","Goods Receipt","DEF Fluid 2.5 gal","Blue Ocean Fuel","","20","$14.40","$288.00","PO-7006"],["2026-05-19","SM-5015","Repair","Drive Belt A42","Internal","","-1","$9.80","$9.80","WO-1005"]])}`; }
    function purchasingForm() { return `${header("Purchasing", "Issue POs, receive goods, match invoices, and release payments.", "New PO")}<div class="form"><div class="field"><label>PO #</label><div class="input">PO-7007</div></div><div class="field"><label>Vendor</label><div class="input">Blue Ocean Fuel</div></div><div class="field"><label>Jobsite / Project</label><div class="input">LMS Main Shop</div></div><div class="field"><label>Payment terms</label><div class="input">30 days</div></div><div class="field"><label>Incoterm</label><div class="input">FOB</div></div><div class="field"><label>Foreign order</label><div class="input">Unchecked</div></div></div>${table(["Product","WO #","Unit","On Hand","Qty","Cost","Amount"], [["SKU-1001 - All-Purpose Cleaner","WO-1004","Each","96","12","$3.25","$39.00"],["SKU-1011 - Hydraulic Oil ISO 46","","Gal","9","4","$68.00","$272.00"]])}`; }
    function goodsReceipt() { return `${header("Goods Receipts", "Receive ordered goods only and track partial or full receipt.", "Receive")}<div class="panel"><div class="panel-head"><strong>Receive PO lines</strong><button>Reverse selected receipt</button></div>${table(["GR #","Date","PO","Vendor","Invoice #","SKU","Ordered","Received","Receipt Type","Status"], [["GR-6002-1","2026-05-19","PO-7002","North Coast Supply","12345","SKU-1001","50","30","Full",badge("Received","ok")],["GR-6003-1","2026-05-19","PO-7002","North Coast Supply","","SKU-1001","50","20","Partial",badge("Reversed","bad")]])}</div>`; }
    function apCheckRun() { return `<div class="split"><div>${header("Accounts Payable", "Post vendor invoices from received PO lines.", "Post AP")} ${table(["Vendor","PO","Invoice","Due Date","Amount","Status"], [["North Coast Supply","PO-7002","12345","2026-06-18","$207.50",badge("Open","warn")],["Pacific Tire Center","PO-7005","PT-9007","2026-06-29","$992.00",badge("Ready","ok")]])}</div><div>${header("Check Run", "Select payables and pay from cash or credit card payable.", "New check run")} ${table(["Include","Vendor","Invoice","Payment Account","Amount"], [["✓","North Coast Supply","12345","FHB Checking","$207.50"],["","Pacific Tire Center","PT-9007","Credit Card Payable","$992.00"]])}</div></div>`; }
    function salesOrder() { return `${header("Sales Orders", "Track customer demand and committed inventory.", "New order")}<div class="form"><div class="field"><label>Customer</label><div class="input">Island Schools</div></div><div class="field"><label>Customer PO</label><div class="input">ISD-7781</div></div><div class="field"><label>Payment mode</label><div class="input">PO</div></div></div>${table(["Product","On Hand","Qty","Price","Status"], [["SKU-1001 - All-Purpose Cleaner","96","12","$7.99",badge("Available","ok")],["SKU-1020 - Special pump","0","2","$185.00",badge("Parts to Order","warn")]])}`; }
    function fleetMaster() { return `${header("Fleet & Equipment", "Track vehicles, heavy equipment, readings, ownership, and assignments.", "Add asset")}<input class="search" value="Search fleet and equipment by tag, name, model, serial, location">${table(["Photo","New QR","Old QR","Needs QR","Asset #","Description","Parent Asset","Compatible With","Location","Status"], [["No photo","QR","3010","✓","3010","Silent type generator","","","Job Site",badge("For Repair","warn")],["No photo","QR","AS01","","LMS-AS01","Asphalt spreader","TRK-01","Furd attachments","Warehouse",badge("Operational","ok")]])}`; }
    function qrScan() { return `<div class="phone"><h3>Scanned Asset LMS-AS01</h3><div class="phone-card"><strong>Current location</strong><div class="sub">Warehouse</div></div><button class="primary" style="width:100%;margin-bottom:8px">Update location and GPS</button><button style="width:100%;margin-bottom:8px">Upload asset photo</button><button style="width:100%">Request repair</button><div class="phone-card"><strong>Captured</strong><div class="sub">Phone timestamp, GPS when allowed, scanned date</div></div></div>`; }
    function workOrder() { return `${header("Repairs", "Work orders with mechanic time, inventory parts, labor, and next service.", "New work order")}<div class="form"><div class="field"><label>WO #</label><div class="input">WO-1004</div></div><div class="field"><label>Asset</label><div class="input">3010 - Silent type generator</div></div><div class="field"><label>Priority</label><div class="input">Medium</div></div><div class="field wide"><label>Equipment issues</label><div class="input">Leak inspection, low output, generator service</div></div></div>${table(["Part / Description","Issue","Needed","Accepted","Status"], [["Hydraulic Oil ISO 46","General","1","1",badge("Accepted","ok")],["Unknown belt description","Low output","1","0",badge("Needs Part #","warn")]])}`; }
    function mechanicMobile() { return `<div class="phone"><h3>Ari - assigned work</h3><input class="search" style="width:100%" value="Search WO"><div class="phone-card"><strong>WO-1004</strong><div class="sub">3010 - Silent type generator</div><p>Issue: low output and leak inspection</p><button class="primary" style="width:100%">Clock in now</button></div><div class="phone-card"><strong>Still clocked in</strong><div class="sub">This work order stays focused until clock out.</div></div></div>`; }
    function mechanicParts() { return `<div class="phone"><h3>WO-1004 active</h3><div class="phone-card"><strong>Request parts</strong><div class="input">Search SKU or describe part needed</div><div class="input" style="margin-top:8px">Qty needed: 1</div><button style="width:100%;margin-top:8px">Send parts request</button></div><div class="phone-card"><strong>Reserved parts</strong><p>Hydraulic Oil ISO 46 - 1 remaining</p><button class="primary" style="width:100%">Accept part</button></div><button style="width:100%;margin-bottom:8px">Ask mechanic help</button><button class="primary" style="width:100%">Ready to close</button></div>`; }
    function invoiceScreen() { return `${header("Invoice", "Customer invoice with signature and work-done narration.", "Print")}<div class="panel" style="padding:24px"><h2 style="color:#0b5f68">LMS Imports Invoice WO-10004</h2><div class="split"><div class="card"><strong>Bill To</strong><p>Coral Construction<br>Customer PO CC-4812</p></div><div class="card"><strong>Status</strong><p>Open<br>Due 2026-06-15</p></div></div>${table(["Date","Work Done","Mechanic","Hours"], [["2026-05-16","Diagnosed leak and inspected generator output.","Ari","1.25"],["2026-05-16","Accepted hydraulic oil and completed service test.","Ari","0.75"]])}<div class="card" style="margin-top:14px"><strong>Customer Signature</strong><div style="height:48px;border-bottom:1px solid var(--line);margin-top:14px"></div></div></div>`; }
    function reports() { return `${header("Accounting Reports", "Financial statements, aging, and bank reconciliation.", "Generate")}<div class="stats">${card("Trial Balance","Balanced","Posting date basis")}${card("Income Statement","Detailed","Clickable line items")}${card("Balance Sheet","Detailed","As of date")}${card("Bank Recon","Per bank","Book to bank balance")}</div>${table(["Report","Date Basis","Export"], [["AR Aging","As-of unpaid invoices","Excel / PDF"],["AP Aging","As-of unpaid vendor invoices","Excel / PDF"],["Inventory Balance","As-of stock movement","Excel / PDF"],["Cash Flow","Posting date","Excel / PDF"]])}`; }
    function render() {
      const step = steps[index];
      $("screen").innerHTML = step.html;
      $("caption").textContent = step.caption;
      $("stepCount").textContent = `${index + 1} of ${steps.length} - ${step.group}: ${step.title}`;
      $("cursor").style.setProperty("--x", step.x);
      $("cursor").style.setProperty("--y", step.y);
      $("bar").style.width = `${((index + 1) / steps.length) * 100}%`;
      document.querySelectorAll(".chapter").forEach((button, i) => button.classList.toggle("active", i === index));
    }
    function buildChapters() {
      $("chapters").innerHTML = steps.map((step, i) => `<button class="chapter" data-step="${i}">${i + 1}. ${step.title}<small>${step.group}</small></button>`).join("");
      document.querySelectorAll(".chapter").forEach((button) => button.onclick = () => { index = Number(button.dataset.step); render(); });
    }
    function next() { index = (index + 1) % steps.length; render(); }
    $("next").onclick = next;
    $("prev").onclick = () => { index = (index - 1 + steps.length) % steps.length; render(); };
    $("play").onclick = () => {
      if (timer) { clearInterval(timer); timer = null; $("play").textContent = "Play"; return; }
      $("play").textContent = "Pause";
      timer = setInterval(next, 8000);
    };
    buildChapters();
    render();
  </script>
</body>
</html>
