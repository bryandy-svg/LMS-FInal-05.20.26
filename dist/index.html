<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LMS Imports Supabase System</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <aside class="side">
      <div class="brand">LMS Imports<span>Inventory, fleet, repair, rental, accounting</span></div>
      <nav id="nav"></nav>
      <div class="session" id="sessionBox"></div>
    </aside>
    <main class="main">
      <header class="top">
        <div>
          <h1 id="viewTitle">Dashboard</h1>
          <p id="viewSub">Live data from Supabase.</p>
        </div>
        <div class="btnline">
          <button id="importBtn">Import local JSON</button>
          <button id="sampleBtn">Load Sample Data</button>
          <button id="clearBtn" class="danger">Clear Test Data</button>
          <button id="exportBtn">Export</button>
          <button id="quickTourBtn">Quick overview</button>
          <button id="fullTourBtn">Full tutorial</button>
          <button id="refreshBtn">Refresh</button>
          <button id="logoutBtn">Logout</button>
        </div>
      </header>
      <section id="loginPanel" class="login-panel">
        <div class="login-card">
          <h2>LMS Imports Login</h2>
          <p>Use the company user account assigned in User Master.</p>
          <input id="email" type="email" placeholder="Username or email">
          <input id="password" type="password" placeholder="Password">
          <button id="loginBtn" class="primary">Log in</button>
          <div id="loginMsg" class="msg"></div>
        </div>
      </section>
      <section id="content" class="content"></section>
    </main>

    <div class="modalback" id="modal">
      <div class="modalbox">
        <div class="modalhead">
          <h2 id="modalTitle">Entry</h2>
          <button id="modalClose" class="rowbtn">x</button>
        </div>
        <div class="modalbody" id="modalBody"></div>
        <div class="modalfoot">
          <button id="modalCancel">Cancel</button>
          <button id="modalSave" class="primary">Save</button>
        </div>
      </div>
    </div>

    <input id="fileImport" type="file" accept="application/json" hidden>
    <input id="assetFileImport" type="file" accept=".xlsx,.xls,.csv,text/csv,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel" hidden>
    <input id="assetLocationFileImport" type="file" accept=".xlsx,.xls,.csv,text/csv,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel" hidden>
    <input id="productFileImport" type="file" accept=".xlsx,.xls,.csv,text/csv,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel" hidden>
    <input id="trialBalanceFileImport" type="file" accept=".xlsx,.xls,.csv,text/csv,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel" hidden>
    <script type="module" src="./app.js"></script>
  </body>
</html>
